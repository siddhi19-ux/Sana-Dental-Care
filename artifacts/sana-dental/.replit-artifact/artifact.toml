kind = "web"
previewPath = "/"
title = "Sana Dental Clinic"
version = "1.0.0"
id = "artifacts/sana-dental"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24698

[services.development]
run = "pnpm --filter @workspace/sana-dental run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sana-dental", "run", "build" ]
publicDir = "artifacts/sana-dental/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24698"
BASE_PATH = "/"
